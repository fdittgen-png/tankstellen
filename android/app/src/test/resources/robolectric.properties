# Android Auto v1 (#2948) — the app targets SDK 36 (Flutter default), but
# Robolectric 4.12.2 only ships sandboxes up to API 34. Pin the car-screen JVM
# tests to 34 so the SDK picker resolves a supported sandbox instead of
# failing on the targetSdk. Bump alongside any Robolectric upgrade that adds a
# newer API level.
sdk=34
