# See docs/guides/fdroid-submission.md for the full fork → lint → build → MR
# flow and the external-review caveats.
#
# This is the REPRODUCIBLE-BUILD recipe: F-Droid's buildserver checks out the
# tagged source and builds the GMS-free `fdroid` flavor itself (unlike the
# self-hosted repo under fdroid/, which ships a prebuilt APK).
#
# #3481 — this file mirrors the fdroiddata MR !42093 branch `add-sparkilo`
# byte-for-byte below this comment block (the MR iterations dropped
# `subdir:`/`gradle:` — the whole-app `flutter build apk --flavor fdroid`
# needs neither — and Summary/Description, which F-Droid reads from the
# upstream fastlane/metadata structure instead).

Categories:
  - Internet
  - Navigation
License: MIT
AuthorName: Florian DITTGEN
AuthorEmail: fdittgen@gmail.com
WebSite: https://github.com/fdittgen-png/tankstellen
SourceCode: https://github.com/fdittgen-png/tankstellen
IssueTracker: https://github.com/fdittgen-png/tankstellen/issues

Name: Sparkilo
AutoName: Sparkilo

RepoType: git
Repo: https://github.com/fdittgen-png/tankstellen.git

Builds:
  - versionName: 6.0.4
    versionCode: 51371
    commit: v6.0.4
    output: build/app/outputs/flutter-apk/app-*-fdroid-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E 's/.*flutter-version:\ "(.*)"/\1/p' .github/workflows/fdroid.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - cp pubspec_overrides.fdroid.yaml pubspec_overrides.yaml
      - cp pubspec.fdroid.lock pubspec.lock
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
      - $$flutter$$/bin/dart run build_runner build --delete-conflicting-outputs
    scanignore:
      - third_party/google_mlkit_commons
      - third_party/google_mlkit_text_recognition
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      # One block shape for all ABIs: the target platform + the flutter
      # base build number derive from this block's versionCode (flutter's
      # --split-per-abi offsets are +1000 armeabi-v7a / +2000 arm64-v8a /
      # +4000 x86_64), so checkupdates-cloned blocks stay correct.
      - case $(( $$VERCODE$$ % 10 )) in 1) abi=android-arm;; 2) abi=android-arm64;;
        *) abi=android-x64;; esac
      - $$flutter$$/bin/flutter build apk --release --flavor fdroid --split-per-abi
        --target-platform $abi --build-number=$(( $$VERCODE$$ / 10 ))
        --dart-define=FORCE_LOCATION_MANAGER=true --dart-define=FGS_FORM_APPROVED=true
