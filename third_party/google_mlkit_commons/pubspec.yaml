# tankstellen #3172 — VENDORED copy of pub.dev google_mlkit_commons with the
# iOS plugin platform REMOVED (ios/ dir + the `ios:` plugin entry).
# iOS OCR is 100% Apple Vision since #3052; stripping the iOS side here
# removes the unused GoogleMLKit/MLKit* pods (tens of MB of IPA).
# Android is byte-identical to upstream — ML Kit stays the Android OCR
# engine. Wired via dependency_overrides in the app pubspec. To update:
# re-copy from the pub cache and re-apply this strip. Delete this vendor
# when upstream offers a per-platform opt-out or iOS support is split out.
name: google_mlkit_commons
description: "A Flutter plugin with commons files to implement google's standalone ml kit made for mobile platform."
version: 0.11.1
homepage: https://github.com/flutter-ml/google_ml_kit_flutter
repository: https://github.com/flutter-ml/google_ml_kit_flutter/tree/master/packages/google_mlkit_commons

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.google_mlkit_commons
        pluginClass: GoogleMlKitCommonsPlugin
