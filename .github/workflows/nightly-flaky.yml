name: Nightly Flaky + Network Suite

# Companion to #1584. The `flaky` + `network` buckets are excluded from
# PR + master CI because their failures are intermittent and would
# block merges. This workflow re-runs them once a day so a real
# regression in a tagged test still surfaces within ~24 h.
#
# Tag scope:
#   - `network` — live-API tests (Italy MIMIT, Argentina, etc).
#   - `flaky`   — platform-plugin tests whose channel timing is
#                 unreliable in headless runners (share_plus, etc).

on:
  schedule:
    # 05:00 UTC = 07:00 Europe/Paris (CEST) / 06:00 (CET).
    # Runs an hour after the nightly-full suite so failures don't
    # collide with the full-suite comment on #1591.
    - cron: '0 5 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-flaky
  cancel-in-progress: false

jobs:
  flaky-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          # #2347 — pin Flutter in lock-step with ci.yml. A floating
          # `channel: stable` picked up an SDK whose Gradle plugin
          # hard-failed on the tflite_flutter JVM-target mismatch
          # (#1936); an unpinned nightly repeats that risk every night
          # stable bumps, producing spurious red that masks real
          # regressions and spams #1584. Keep this value identical to
          # the ci.yml pin; bump both together, never by drift.
          flutter-version: "3.41.9"
          cache: true
      - uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Run flaky + network suites
        # #2003 — the comma form `--tags=flaky,network` is parsed by
        # `package:test` (which `flutter test --tags=` delegates to) as
        # the Boolean expression `flaky && network`. Zero tests carry
        # both tags (`flaky` is on 2 share-plus widget tests; `network`
        # is on 8 live-API tests; intersection is empty), so the runner
        # exited 79 with "No tests match" on every nightly run. The
        # intent — per this workflow's own header comment — is OR: "we
        # cover everything the PR/master path excludes". Use the
        # explicit Boolean form so the selector matches both buckets.
        run: flutter test --tags 'flaky || network'
      - name: Surface failure on tracking issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment 1584 --body \
            "Nightly flaky+network run failed on $(date -u +%F): https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
