name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --no-fatal-infos

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test --coverage
      - name: Check coverage threshold
        run: |
          if [ -f coverage/lcov.info ]; then
            # Filter out generated files (l10n, .g.dart, .freezed.dart) from lcov
            python3 -c "
          import sys
          skip = False
          with open('coverage/lcov.info') as f:
              with open('coverage/lcov_filtered.info', 'w') as out:
                  for line in f:
                      if line.startswith('SF:'):
                          skip = '.g.dart' in line or '.freezed.dart' in line or 'l10n/app_localizations' in line
                      if not skip:
                          out.write(line)
                      if line.startswith('end_of_record'):
                          skip = False
          "
            TOTAL_LINES=$(grep -c "^DA:" coverage/lcov_filtered.info || true)
            HIT_LINES=$(grep "^DA:" coverage/lcov_filtered.info | grep -cv ",0$" || true)
            if [ "$TOTAL_LINES" -gt 0 ]; then
              COVERAGE=$((HIT_LINES * 100 / TOTAL_LINES))
              echo "Coverage: $COVERAGE% ($HIT_LINES/$TOTAL_LINES lines, excluding generated code)"
              if [ "$COVERAGE" -lt 35 ]; then
                echo "::error::Coverage $COVERAGE% is below 35% threshold"
                exit 1
              fi
            fi
          fi
      - run: flutter pub outdated --no-dev-dependencies

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: OSV vulnerability scan
        uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          scan-args: |-
            --lockfile=pubspec.lock

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Check for GPL dependencies
        run: |
          FORBIDDEN=""
          for pkg in $(dart pub deps --no-dev --style=compact 2>/dev/null | tail -n +2 | sed 's/ .*//'); do
            LICENSE_FILE=$(find ~/.pub-cache/hosted/pub.dev/"$pkg"* -maxdepth 1 -iname "LICENSE*" 2>/dev/null | head -1)
            if [ -n "$LICENSE_FILE" ]; then
              if grep -qiE "GNU General Public License|GPL-2|GPL-3|LGPL" "$LICENSE_FILE" 2>/dev/null; then
                if ! grep -qi "LGPL" "$LICENSE_FILE" 2>/dev/null || grep -qi "GPL-3" "$LICENSE_FILE" 2>/dev/null; then
                  FORBIDDEN="$FORBIDDEN\n  - $pkg"
                fi
              fi
            fi
          done
          if [ -n "$FORBIDDEN" ]; then
            echo "::error::GPL-licensed dependencies found:$FORBIDDEN"
            echo "All dependencies must be MIT/BSD/Apache compatible (MIT project)."
            exit 1
          fi
          echo "License check passed — no GPL dependencies found."

  build-android:
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi
      - name: Build App Bundle
        run: flutter build appbundle --release
      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-*.apk
      - uses: actions/upload-artifact@v7
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # build-ios:
  #   runs-on: macos-latest
  #   needs: [analyze, test]
  #   Disabled: iOS build not ready (no code signing, no Apple Developer enrollment)
  #   Re-enable when iOS distribution is set up.

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            android-apk/app-*.apk
            android-aab/app-release.aab
