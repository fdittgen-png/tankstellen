name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  schedule:
    - cron: '0 6 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --no-fatal-infos
      - name: Check feature-module boundaries
        run: bash scripts/check_module_boundaries.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      # Excludes the `network` tag — those tests hit real third-party
      # APIs (Argentina, Italy MIMIT, etc.) that intermittently time out
      # and cannot block PRs. Run them on demand with
      # `flutter test --tags=network` from a workstation.
      - run: flutter test --coverage --exclude-tags=network
      - name: Check coverage threshold
        run: bash scripts/check_coverage.sh
      - name: Check startup time budget
        run: bash scripts/check_startup_budget.sh

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: OSV vulnerability scan
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            --lockfile=pubspec.lock

  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-
      - run: flutter pub get
      - name: Audit dependency licenses
        run: bash scripts/license_audit.sh

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-
      - run: flutter pub get
      - name: Check outdated dependencies and advisories
        run: bash scripts/pub_outdated_check.sh

  build-android:
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      # #48 — Decode the release keystore from a GitHub secret into a temp
      # file, then export the three env vars gradle's resolveReleaseSigning()
      # helper reads. The keystore file is written to a runner-local path
      # outside the checkout so it never ends up in an artifact.
      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "::error::Missing one of ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS secrets. Release builds require all three — see #48." >&2
            exit 1
          fi
          KEYSTORE_PATH="$RUNNER_TEMP/tankstellen-release.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          if ! [ -s "$KEYSTORE_PATH" ]; then
            echo "::error::Decoded keystore is empty or invalid base64" >&2
            exit 1
          fi
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi --flavor play
      - name: Build App Bundle
        run: flutter build appbundle --release --flavor play
      - name: Clean up decoded keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/tankstellen-release.jks"
      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-*-play-release.apk
      - uses: actions/upload-artifact@v7
        with:
          name: android-aab
          path: build/app/outputs/bundle/playRelease/app-play-release.aab

  # build-ios:
  #   runs-on: macos-latest
  #   needs: [analyze, test]
  #   Disabled: iOS build not ready (no code signing, no Apple Developer enrollment)
  #   Re-enable when iOS distribution is set up.

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Generate release body
        id: body
        run: |
          {
            echo 'body<<RELEASE_EOF'
            echo "## Tankstellen v${{ steps.version.outputs.version }}"
            echo ""
            echo "### Artifacts"
            echo "- **APK (split per ABI):** Install directly on Android devices"
            echo "- **AAB (App Bundle):** For Google Play Store upload"
            echo ""
            echo "### Installation"
            echo "Download the APK matching your device architecture:"
            echo "- \`app-arm64-v8a-play-release.apk\` — Most modern phones (ARM 64-bit)"
            echo "- \`app-armeabi-v7a-play-release.apk\` — Older phones (ARM 32-bit)"
            echo "- \`app-x86_64-play-release.apk\` — Emulators and x86 devices"
            echo ""
            echo "---"
            echo "*Auto-generated release from tag \`v${{ steps.version.outputs.version }}\`*"
            echo 'RELEASE_EOF'
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v3
        with:
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.body.outputs.body }}
          generate_release_notes: true
          files: |
            android-apk/app-*.apk
            android-aab/app-play-release.aab
