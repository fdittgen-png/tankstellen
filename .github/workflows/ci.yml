name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --no-fatal-infos
      - run: flutter test --coverage
      - name: Check coverage threshold
        run: |
          if [ -f coverage/lcov.info ]; then
            TOTAL_LINES=$(grep -c "^DA:" coverage/lcov.info || true)
            HIT_LINES=$(grep "^DA:" coverage/lcov.info | grep -cv ",0$" || true)
            if [ "$TOTAL_LINES" -gt 0 ]; then
              COVERAGE=$((HIT_LINES * 100 / TOTAL_LINES))
              echo "Coverage: $COVERAGE% ($HIT_LINES/$TOTAL_LINES lines)"
              if [ "$COVERAGE" -lt 50 ]; then
                echo "::error::Coverage $COVERAGE% is below 50% threshold"
                exit 1
              fi
            fi
          fi
      - run: flutter pub outdated --no-dev-dependencies

  build-android:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build ios --release --no-codesign
      - name: Archive iOS build
        run: |
          cd build/ios/iphoneos
          zip -r Runner.app.zip Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphoneos/Runner.app.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            android-apk/app-release.apk
            ios-app/Runner.app.zip
