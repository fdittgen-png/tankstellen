name: CI

on:
  push:
    branches: [master]
    paths:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [master]
    paths:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - run: echo "docs-only change — analyze skipped (stub passes for branch protection)"

  # Mirror the sharded matrix from ci.yml (#1581) so the required-status
  # check names `test (0)..test (3)` resolve on docs-only PRs. Without
  # this, branch protection blocks every docs PR with `mergeStateStatus: BLOCKED`.
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - run: echo "docs-only change — test shard ${{ matrix.shard }} skipped (stub passes for branch protection)"

  coverage-merge:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - run: echo "docs-only change — coverage-merge skipped (stub passes for branch protection)"

  # #2336 — `l10n-gate` is required. ci.yml is path-ignored on docs-only
  # PRs so its real l10n-gate never runs; docs PRs never touch
  # `lib/l10n/` anyway. Pass-through stub so the context resolves.
  l10n-gate:
    runs-on: ubuntu-latest
    steps:
      - run: echo "docs-only change — l10n-gate skipped (stub passes for branch protection)"
