name: Play Store listing

# Pushes the metadata + screenshots under docs/play-store/ to the
# Google Play Console without rebuilding the app. Defaults to the
# `internal` track so a stale or wrong copy never accidentally lands on
# production. To promote to production, dispatch manually with the
# `track` input set to `production`.
#
# Triggers:
# - workflow_dispatch (manual, with track + dry-run inputs)
# - push to master that touches docs/play-store/metadata/** or
#   docs/play-store/screenshots/published/** (auto-publishes to internal
#   track only — never production from a push)
#
# Secret required:
# - PLAY_STORE_SERVICE_ACCOUNT_JSON: raw JSON contents of the Google
#   Play Developer service-account key. Same secret the daily AAB
#   upload (daily-beta.yml) uses, so a single secret covers both
#   pipelines. Generated under Play Console → Setup → API access →
#   service accounts.
#
# Companion: the `/play-store-shots` slash command syncs raw captures
# from docs/play-store/screenshots/inbox/ into the canonical paths this
# workflow uploads from.

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Console track to publish to'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
        default: internal
      dry_run:
        description: 'Dry-run (validate only, no upload)'
        type: boolean
        default: false
  push:
    branches: [master]
    paths:
      - 'docs/play-store/metadata/**'
      - 'docs/play-store/screenshots/published/**'

concurrency:
  group: play-store-listing
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Resolve track
        id: track
        run: |
          set -euo pipefail
          # Pushes to master always go to the safest track (internal);
          # only an explicit workflow_dispatch can promote further.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "track=${{ inputs.track }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            echo "track=internal" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write service-account JSON
        env:
          SA_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${SA_JSON:-}" ]; then
            echo "::error::PLAY_STORE_SERVICE_ACCOUNT_JSON secret is not set. Configure it under Settings → Secrets → Actions (same secret as daily-beta.yml)."
            exit 1
          fi
          printf '%s' "$SA_JSON" > /tmp/play-store-key.json
          echo "Wrote key — $(wc -c < /tmp/play-store-key.json) bytes."

      - name: Validate metadata
        run: |
          set -euo pipefail
          ROOT=docs/play-store/metadata/android
          MISSING=0
          for locale in en-US de-DE fr-FR; do
            for f in title.txt short_description.txt full_description.txt changelogs/default.txt; do
              path="$ROOT/$locale/$f"
              if [ ! -f "$path" ]; then
                echo "::error file=$path::missing required metadata file"
                MISSING=1
              fi
            done
          done
          # Length budgets enforced client-side too — Play Console rejects but better to fail fast.
          for locale in en-US de-DE fr-FR; do
            t=$(wc -c < "$ROOT/$locale/title.txt")
            s=$(wc -c < "$ROOT/$locale/short_description.txt")
            l=$(wc -c < "$ROOT/$locale/full_description.txt")
            (( t <= 31 ))   || { echo "::error::$locale title $t bytes > 30"; MISSING=1; }
            (( s <= 81 ))   || { echo "::error::$locale short $s bytes > 80"; MISSING=1; }
            (( l <= 4001 )) || { echo "::error::$locale full $l bytes > 4000"; MISSING=1; }
          done
          [ "$MISSING" = "0" ]

      - name: Mirror published screenshots into per-locale directories
        run: |
          set -euo pipefail
          SRC=docs/play-store/screenshots/published
          if [ ! -d "$SRC" ] || [ -z "$(ls -A $SRC 2>/dev/null | grep -v -E '^(\.gitkeep|README\.md)$')" ]; then
            echo "No published screenshots — skipping screenshot upload (metadata-only run)."
            exit 0
          fi
          for locale in en-US de-DE fr-FR; do
            dst=docs/play-store/metadata/android/$locale/images/phoneScreenshots
            mkdir -p "$dst"
            # Convert canonical NN-name.png → fastlane NN_name.png
            for src in "$SRC"/[0-9][0-9]-*.png; do
              [ -f "$src" ] || continue
              base=$(basename "$src")
              renamed=$(echo "$base" | sed 's/^\([0-9][0-9]\)-/\1_/')
              cp "$src" "$dst/$renamed"
            done
            echo "Mirrored $(ls $dst | wc -l) screenshots → $locale"
          done

      - name: Set up Ruby + bundler
        # We push metadata via `fastlane supply` (fastlane is already in
        # the repo's Gemfile for the iOS lanes). `r0adkll/upload-google-
        # play@v1` was the previous uploader but its action requires a
        # `releaseFiles` AAB — there's no metadata-only mode — so it
        # can't drive a listing-copy refresh. `fastlane supply
        # --skip_upload_aab` is the canonical replacement.
        if: steps.track.outputs.dry_run != 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: fastlane supply (metadata + listing assets)
        if: steps.track.outputs.dry_run != 'true'
        env:
          SUPPLY_JSON_KEY: /tmp/play-store-key.json
          SUPPLY_PACKAGE_NAME: de.tankstellen.fuelprices
          SUPPLY_TRACK: ${{ steps.track.outputs.track }}
          # `supply --metadata_path` expects a directory whose direct
          # children are locale folders (`en-US/`, `de-DE/`, …). Our
          # tree adds an `android/` parent, so point supply INTO that
          # parent, not at it — otherwise supply treats `android` as a
          # locale name and Google's API rejects the upload with
          # `android - Invalid request` (run 25607897831).
          SUPPLY_METADATA_PATH: docs/play-store/metadata/android
        run: |
          set -euo pipefail
          # --skip_upload_aab / --skip_upload_apk: metadata-only run.
          # AABs ship from daily-beta.yml + daily-github-release.yml.
          # --skip_upload_changelogs: this listing workflow pushes
          # title + descriptions + icon + featureGraphic +
          # phoneScreenshots only. Changelogs travel WITH each AAB
          # (the AAB-upload workflows already handle them keyed by
          # versionCode), and `supply` rejects a metadata-only run
          # that touches `default.txt` without a `--version_code`
          # to attach it to (run 25608959525).
          # The defaults still push everything else from the
          # metadata tree at $SUPPLY_METADATA_PATH/<locale>/.
          bundle exec fastlane supply \
            --json_key "$SUPPLY_JSON_KEY" \
            --package_name "$SUPPLY_PACKAGE_NAME" \
            --track "$SUPPLY_TRACK" \
            --metadata_path "$SUPPLY_METADATA_PATH" \
            --skip_upload_aab \
            --skip_upload_apk \
            --skip_upload_changelogs \
            --sync_image_upload

      - name: Dry-run summary
        if: steps.track.outputs.dry_run == 'true'
        run: |
          echo "::notice::Dry run — validated metadata + mirrored screenshots, did NOT upload."
          echo "Would have uploaded to track: ${{ steps.track.outputs.track }}"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/play-store-key.json
