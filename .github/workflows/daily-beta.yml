name: Daily Open-Testing Build

# Builds master at 18:00 Europe/Paris (CEST) and uploads to the open-testing track.
# Cron is UTC: 16:00 UTC = 18:00 CEST (summer) / 17:00 CET (winter).
# Adjust to '0 17 * * *' if you want 18:00 Paris during winter instead.
#
# The Play Store version code is derived from the monotonic workflow run
# counter (`github.run_number` + `github.run_attempt`), computed at build
# time — no commit is pushed back to master. Play version codes are global
# across tracks and must STRICTLY INCREASE, so the counter guarantees a
# unique, monotonically-rising code for every run *and* every re-run attempt
# (#1882 — the previous YYYYMMDDHH scheme collided when two runs landed in
# the same hour). The base sits just above the last date-scheme code ever
# uploaded; (2_100_000_000 - base) / 10 leaves ~7M runs of head-room under
# Android's version-code cap. pubspec.yaml's +N keeps tracking manual releases.
on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play track'
        required: true
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
        default: beta
      release_notes:
        description: 'Release notes (overrides per-version changelog files)'
        required: false
        type: string

concurrency:
  group: daily-open-testing
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # contents: write — required by the post-upload tag push (#3177) so
      # every shipped versionCode maps back to a commit.
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master

      - name: Compute build number
        id: bn
        run: |
          # #1882 — the old YYYYMMDDHH scheme gave only hour resolution,
          # #3513 — ONE shared wall-clock scheme across every release-build
          # workflow (minutes since 2025-07-06 UTC on a 2026100000 base):
          # per-workflow run counters could leapfrog each other and trip
          # Play's no-downgrade rule (the v6.0.3 tag deploy did exactly
          # that). Strictly monotonic everywhere, above every shipped code,
          # ~230 years under the 2_147_483_647 cap.
          BN=$(( 2026100000 + ( $(date -u +%s) - 1751760000 ) / 60 )) # #3513 shared scheme
          echo "build_number=$BN" >> "$GITHUB_OUTPUT"
          echo "Build number: $BN" \
            "(run ${{ github.run_number }}, attempt ${{ github.run_attempt }})"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "::error::Missing keystore secrets. Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS." >&2
            exit 1
          fi
          KEYSTORE_PATH="$RUNNER_TEMP/upload-keystore.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"

      # #3543 — cache + retry-pre-install the NDK the AGP would otherwise
      # download on demand (flaked 4× on 2026-07-09; see ci.yml for the
      # full rationale). A flaky CDN must not kill the daily upload.
      - name: Cache Android NDK
        id: ndk-cache
        uses: actions/cache@v6
        with:
          path: /usr/local/lib/android/sdk/ndk/27.0.12077973
          key: ${{ runner.os }}-ndk-27.0.12077973
      - name: Pre-install Android NDK (bounded retries)
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          for attempt in 1 2 3; do
            if "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install 'ndk;27.0.12077973' < /dev/null > /dev/null; then
              break
            fi
            echo "NDK install attempt $attempt failed — cleaning + retrying in 20s (#3543)"
            rm -rf "$ANDROID_HOME/ndk/27.0.12077973"
            sleep 20
          done
          if [ ! -d "$ANDROID_HOME/ndk/27.0.12077973" ]; then
            echo "::error::NDK 27.0.12077973 install failed after 3 attempts (#3543)" >&2
            exit 1
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Build AAB (play flavor, run-counter build number)
        # #3434 — the FGS define is gated on the repo variable
        # FGS_FORM_APPROVED (Settings → Secrets and variables → Actions →
        # Variables). While unset/false the GPS foreground service (#3173)
        # ships DARK (#3375): uploading an FGS bundle before the Play
        # "Foreground services" declaration (#3436) is approved 403s
        # ("you must let us know whether your app uses any Foreground
        # Service permissions"). Once the declaration clears, set the
        # variable to `true` — no workflow edit needed.
        run: flutter build appbundle --release --flavor play --build-number=${{ steps.bn.outputs.build_number }} ${{ vars.FGS_FORM_APPROVED == 'true' && '--dart-define=FGS_FORM_APPROVED=true' || '' }}

      - name: Clean up decoded keystore
        if: always()
        run: rm -f "$ANDROID_KEYSTORE_PATH"

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python deps
        # #1999 — `google-auth-httplib2` is a transitive dep of
        # `google-api-python-client`, but make it explicit so a future
        # constraint change in the upstream wheel can't silently
        # break the long-timeout `AuthorizedHttp` wiring in
        # `tools/upload_to_play.py`.
        run: pip install --quiet google-api-python-client google-auth google-auth-httplib2

      - name: Decode service-account key
        env:
          SA_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$SA_JSON" ]; then
            echo "::error::PLAY_STORE_SERVICE_ACCOUNT_JSON secret is not set." >&2
            exit 1
          fi
          echo "$SA_JSON" > "$RUNNER_TEMP/play-key.json"
          echo "PLAY_KEY_PATH=$RUNNER_TEMP/play-key.json" >> "$GITHUB_ENV"

      - name: Upload to Play Store
        run: |
          python tools/upload_to_play.py \
            --aab build/app/outputs/bundle/playRelease/app-play-release.aab \
            --key "$PLAY_KEY_PATH" \
            --track "${{ github.event.inputs.track || 'beta' }}" \
            ${{ github.event.inputs.release_notes && format('--release-notes "{0}"', github.event.inputs.release_notes) || '' }}

      - name: Clean up service-account key
        if: always()
        run: rm -f "$PLAY_KEY_PATH"

      - name: Tag the shipped build (vX.Y.Z+BUILD)
        # #3177 — every CI-minted versionCode must map back to a commit
        # (the About-screen build number is the documented first triage
        # step). Annotated tag pushed with the default GITHUB_TOKEN:
        # token-pushed tags do NOT trigger other workflows (GitHub's
        # recursion guard), so deploy.yml's `on: push: tags: v*` does NOT
        # fire for these — manual `git push origin v...` stays the only
        # way to trigger a Play production deploy.
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          TAG="v${VERSION}+${{ steps.bn.outputs.build_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Beta build ${{ steps.bn.outputs.build_number }} (track: ${{ github.event.inputs.track || 'beta' }}) — $GITHUB_SHA"
          git push origin "$TAG"
          echo "Tagged $TAG"

      - name: Summary
        if: always()
        run: |
          echo "## Daily Open-Testing Release" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Build number:** ${{ steps.bn.outputs.build_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Track:** ${{ github.event.inputs.track || 'beta' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
