# F-Droid no-GMS audit (#2575, hardened by #3480)
#
# ADVISORY workflow — proves the `fdroid` flavor ships ZERO proprietary Google
# Mobile Services (and no Sentry). It is intentionally NOT a required check /
# branch-protection context: it has no ci-docs-stub.yml coverage, and a
# transient Android/Gradle failure must never block `gh pr merge --auto`. The
# authoritative gate is the dependency-graph layer (layer A of
# scripts/audit_no_gms.sh), which is fast and deterministic; the RELEASE-APK
# dex layer (B + strict C) is the belt-and-braces proof that not even a
# dangling type REFERENCE survives into the shipped bytecode — the exact bar
# F-Droid's `check apk` scanner applies (it rejected MR !42093 on references
# a debug-dex audit could not see, #3480).
#
# A RELEASE apk is built deliberately (#3480): only R8 strips Flutter's dead
# PlayStoreDeferredComponentManager references (#3479), so the debug dex this
# workflow used to audit could never prove the 0-reference bar. The build is
# keyless-UNSIGNED — an fdroid-only release without a keystore is the
# sanctioned F-Droid shape (#3471; F-Droid signs downstream).

name: F-Droid no-GMS audit

on:
  pull_request:
  push:
    branches: [master]

# Single self-contained job → exactly one status context ("build-fdroid"),
# never gated per-step. Keep it OUT of required checks.
concurrency:
  group: fdroid-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-fdroid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Pin to the build-android-green SDK (matches ci.yml's build-android).
          flutter-version: "3.41.9"
          cache: true
      - uses: actions/cache@v6
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-
      - uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      # #3479 — swap GMS-tied plugins for FOSS/no-op stubs BEFORE resolving deps,
      # exactly as the fdroiddata recipe prebuild does, so this audit runs
      # against the real libre dependency graph (in_app_review stubbed → no Play
      # Core `review` classes, etc.). Play/iOS jobs never run this step.
      - run: dart run tool/apply_fdroid_overrides.dart
      # #3507 — enforce the committed LIBRE lockfile (pubspec.fdroid.lock,
      # swapped in by the apply tool): a dependency bump that forgets to
      # regenerate it fails HERE, not on F-Droid's buildserver.
      - run: flutter pub get --enforce-lockfile
      - run: dart run build_runner build --delete-conflicting-outputs
      # Build the keyless-unsigned RELEASE fdroid APK with the GMS-free
      # runtime config (#3480 — release, not debug: only R8 strips the dead
      # Play-Core deferred-components refs, #3479, so only the release dex can
      # prove the 0-reference bar F-Droid's check-apk applies). #3435 — FGS
      # define matches fdroid-publish.yml so the audit runs against the same
      # artifact shape F-Droid actually ships. #3471 sanctions the
      # keystore-less fdroid-only release (unsigned; F-Droid signs downstream).
      - name: Build fdroid release APK (unsigned)
        run: flutter build apk --release --flavor fdroid --dart-define=FORCE_LOCATION_MANAGER=true --dart-define=FGS_FORM_APPROVED=true
      # Layer A (dependency graph) ALWAYS runs; layers B + strict C (dex,
      # #3480: class definitions AND dangling references must both be 0) run
      # on the release APK just produced — strict mode auto-enables on the
      # release-named APK. dexdump comes from the runner's Android SDK
      # build-tools (ANDROID_HOME is set on ubuntu-latest); the script falls
      # back to `strings` if it cannot find it.
      - name: Audit — no GMS / MLKit / Play Core / Sentry (strict)
        run: bash scripts/audit_no_gms.sh build/app/outputs/flutter-apk/app-fdroid-release.apk
