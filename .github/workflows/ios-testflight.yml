name: iOS TestFlight Build

# Build a signed iOS IPA on a macOS runner and upload it to TestFlight via the
# App Store Connect API. Mirror of `daily-beta.yml` but for iOS.
#
# Build numbers are date+hour-based (YYYYMMDDHH) computed at build time, so
# there's no commit pushed back to master and re-runs on the same day get
# distinct, monotonically-increasing CFBundleVersions.

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'TestFlight changelog (max 4000 chars)'
        required: false
        type: string
        default: 'Daily build.'
  # Schedule trigger intentionally left commented until we've confirmed two
  # consecutive manual runs land in TestFlight cleanly. Then uncomment to
  # mirror Android's nightly cadence.
  # schedule:
  #   - cron: '0 16 * * *'

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Compute date-based build number
        id: bn
        run: |
          BN=$(TZ=Europe/Paris date +%Y%m%d%H)
          echo "build_number=$BN" >> "$GITHUB_OUTPUT"
          echo "Daily build number: $BN"

      - name: Select Xcode 26+
        # macos-latest selects Xcode 16.4 (iOS 18.5 SDK) by default. Apple
        # rejects TestFlight uploads built with anything older than Xcode 26
        # since the iOS 26 release: altool returns
        #   "SDK version issue. This app was built with the iOS 18.5 SDK.
        #    All iOS and iPadOS apps must be built with the iOS 26 SDK or
        #    later, included in Xcode 26 or later"
        # The runner image ships multiple Xcodes side-by-side; this picks
        # the newest stable and points DEVELOPER_DIR at it.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install CocoaPods under active Ruby
        # The macos-latest runner ships a system pod bound to system Ruby; once
        # `ruby/setup-ruby` switches the active Ruby to 3.3, that system pod's
        # GEM_HOME no longer matches and flutter sees "CocoaPods is installed
        # but broken." Reinstall under the active Ruby so `pod` on PATH works
        # both for the explicit step below and for flutter's auto-pod fallback.
        run: gem install cocoapods --no-document

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        run: cd ios && pod install --repo-update

      - name: Decode App Store Connect API key
        env:
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          if [ -z "$ASC_KEY_BASE64" ]; then
            echo "::error::APP_STORE_CONNECT_API_KEY_BASE64 secret is not set." >&2
            exit 1
          fi
          KEY_PATH="$RUNNER_TEMP/asc-api-key.p8"
          echo "$ASC_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          echo "ASC_API_KEY_FILEPATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Set up SSH agent with match deploy key
        # The match repo (fdittgen-png/tankstellen-ios-certs) is fetched
        # via SSH using a deploy key stored in MATCH_DEPLOY_KEY. PAT-based
        # auth was tried first but GitHub's fine-grained PAT scope kept
        # rejecting clone requests with 403; deploy keys bypass the PAT
        # scoping entirely and are read-only by design (#1498).
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}

      - name: Add github.com to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts

      - name: fastlane release_testflight
        working-directory: ios
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          # ASC_API_KEY_FILEPATH was exported by the decode step above so the
          # Fastfile's `asc_api_key` helper picks up the on-disk .p8.
          IOS_BUILD_NUMBER: ${{ steps.bn.outputs.build_number }}
          TESTFLIGHT_CHANGELOG: ${{ github.event.inputs.release_notes || 'Daily build.' }}
          FASTLANE_DISABLE_COLORS: '1'
          FASTLANE_HIDE_CHANGELOG: '1'
        run: bundle exec fastlane release_testflight build_number:"${IOS_BUILD_NUMBER}" changelog:"${TESTFLIGHT_CHANGELOG}"

      - name: Clean up decoded API key
        if: always()
        run: rm -f "$ASC_API_KEY_FILEPATH"

      - name: Summary
        if: always()
        run: |
          {
            echo "## iOS TestFlight Release"
            echo ""
            echo "- **Build number:** ${{ steps.bn.outputs.build_number }}"
            echo "- **Bundle ID:** de.tankstellen.tankstellen"
            echo "- **Trigger:** ${{ github.event_name }}"
            echo "- **Changelog:** ${{ github.event.inputs.release_notes || 'Daily build.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
