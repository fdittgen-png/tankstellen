name: iOS TestFlight Build

# Build a signed iOS IPA on a macOS runner and upload it to TestFlight via the
# App Store Connect API. Mirror of `daily-beta.yml` but for iOS.
#
# Build numbers come from a monotonic run-counter (see the build-number step),
# computed at build time, so there's no commit pushed back to master and every
# run gets a distinct, strictly-increasing CFBundleVersion.
#
# Scheduled runs (and manual runs with distribute:true) push the build to the
# external 'extern' TestFlight group; plain manual runs stay internal-only.

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'TestFlight changelog (max 4000 chars)'
        required: false
        type: string
        default: 'Daily build.'
      distribute:
        description: 'Distribute to external "extern" testers (submits for Beta App Review). Scheduled runs always distribute.'
        required: false
        type: boolean
        default: false
  schedule:
    # 04:30 Europe/Paris is intentionally distinct from the other daily crons:
    # daily-beta.yml runs at 16:00 and daily-github-release.yml at 21:00, so the
    # iOS nightly external build never collides with them.
    - cron: '30 4 * * *'

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      # contents: write — required by the post-upload tag push (#3177) so
      # every shipped CFBundleVersion maps back to a commit.
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Compute monotonic build number
        id: bn
        # Monotonic run-counter rather than a date stamp: a 2026060000 base
        # offset (above every prior YYYYMMDDHH number) plus the run number and
        # attempt guarantees a strictly-increasing, never-colliding
        # CFBundleVersion across re-runs and re-attempts.
        run: |
          BN=$(( 2026060000 + ${{ github.run_number }} * 10 + ${{ github.run_attempt }} ))
          echo "build_number=$BN" >> "$GITHUB_OUTPUT"
          echo "Build number: $BN"

      - name: Select Xcode 26+
        # macos-latest selects Xcode 16.4 (iOS 18.5 SDK) by default. Apple
        # rejects TestFlight uploads built with anything older than Xcode 26
        # since the iOS 26 release: altool returns
        #   "SDK version issue. This app was built with the iOS 18.5 SDK.
        #    All iOS and iPadOS apps must be built with the iOS 26 SDK or
        #    later, included in Xcode 26 or later"
        # The runner image ships multiple Xcodes side-by-side; this picks
        # the newest stable and points DEVELOPER_DIR at it.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install CocoaPods under active Ruby
        # The macos-latest runner ships a system pod bound to system Ruby; once
        # `ruby/setup-ruby` switches the active Ruby to 3.3, that system pod's
        # GEM_HOME no longer matches and flutter sees "CocoaPods is installed
        # but broken." Reinstall under the active Ruby so `pod` on PATH works
        # both for the explicit step below and for flutter's auto-pod fallback.
        run: gem install cocoapods --no-document

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        run: cd ios && pod install --repo-update

      - name: Decode App Store Connect API key
        env:
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          if [ -z "$ASC_KEY_BASE64" ]; then
            echo "::error::APP_STORE_CONNECT_API_KEY_BASE64 secret is not set." >&2
            exit 1
          fi
          KEY_PATH="$RUNNER_TEMP/asc-api-key.p8"
          echo "$ASC_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          echo "ASC_API_KEY_FILEPATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Set up SSH agent with match deploy key
        # The match repo (fdittgen-png/tankstellen-ios-certs) is fetched
        # via SSH using a deploy key stored in MATCH_DEPLOY_KEY. PAT-based
        # auth was tried first but GitHub's fine-grained PAT scope kept
        # rejecting clone requests with 403; deploy keys bypass the PAT
        # scoping entirely and are read-only by design (#1498).
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}

      - name: Add github.com to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts

      - name: fastlane release_testflight
        working-directory: ios
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          # ASC_API_KEY_FILEPATH was exported by the decode step above so the
          # Fastfile's `asc_api_key` helper picks up the on-disk .p8.
          IOS_BUILD_NUMBER: ${{ steps.bn.outputs.build_number }}
          TESTFLIGHT_CHANGELOG: ${{ github.event.inputs.release_notes || 'Daily build.' }}
          # Scheduled runs always distribute externally; manual runs only when
          # the distribute input is checked.
          DISTRIBUTE: ${{ github.event_name == 'schedule' || inputs.distribute }}
          # Beta App Review contact block carried inline on an external build
          # (the Fastfile omits it gracefully when BETA_CONTACT_PHONE is unset).
          BETA_CONTACT_PHONE: ${{ secrets.BETA_CONTACT_PHONE }}
          BETA_CONTACT_FIRST: ${{ secrets.BETA_CONTACT_FIRST || '' }}
          BETA_CONTACT_LAST: ${{ secrets.BETA_CONTACT_LAST || '' }}
          BETA_FEEDBACK_EMAIL: ${{ secrets.BETA_FEEDBACK_EMAIL || '' }}
          FASTLANE_DISABLE_COLORS: '1'
          FASTLANE_HIDE_CHANGELOG: '1'
        run: bundle exec fastlane release_testflight build_number:"${IOS_BUILD_NUMBER}" changelog:"${TESTFLIGHT_CHANGELOG}" distribute_external:"${DISTRIBUTE}"

      - name: Clean up decoded API key
        if: always()
        run: rm -f "$ASC_API_KEY_FILEPATH"

      - name: Tag the shipped build (vX.Y.Z+BUILD-ios)
        # #3177 — every CI-minted CFBundleVersion must map back to a commit
        # (the About-screen build number is the documented first triage
        # step). The `-ios` suffix keeps the tag namespace disjoint from
        # daily-beta.yml's Android tags: both workflows use independent
        # run counters, so the same numeric build number can occur in both.
        # Pushed with the default GITHUB_TOKEN: token-pushed tags do NOT
        # trigger other workflows (GitHub's recursion guard), so
        # deploy.yml's `on: push: tags: v*` does NOT fire for these.
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          TAG="v${VERSION}+${{ steps.bn.outputs.build_number }}-ios"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "TestFlight build ${{ steps.bn.outputs.build_number }} — $GITHUB_SHA"
          git push origin "$TAG"
          echo "Tagged $TAG"

      # #1777 — retain the obfuscation symbol files (written by
      # `flutter build ios --split-debug-info` in the Fastfile) so an
      # obfuscated iOS release crash can be de-obfuscated later.
      - name: Upload obfuscation symbols
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-debug-symbols
          path: build/symbols
          if-no-files-found: warn
          retention-days: 90

      - name: Summary
        if: always()
        run: |
          {
            echo "## iOS TestFlight Release"
            echo ""
            echo "- **Build number:** ${{ steps.bn.outputs.build_number }}"
            echo "- **Bundle ID:** de.tankstellen.tankstellen"
            echo "- **Trigger:** ${{ github.event_name }}"
            echo "- **Changelog:** ${{ github.event.inputs.release_notes || 'Daily build.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
