name: Daily GitHub Release

# Builds master at ~23:00 Europe/Paris and publishes a pre-release on
# https://github.com/${{ github.repository }}/releases with the Android AAB +
# 3 split APKs and the iOS IPA + dSYMs attached, plus a changelog
# summarising commits since the previous nightly. Skips silently when no
# commits landed since the last nightly so we don't ship empty releases.
#
# Cron is fixed UTC (21:00 → 23:00 Paris in summer / 22:00 in winter).
# The ±1h DST drift mirrors `daily-beta.yml`'s convention; flip to
# `0 22 * * *` if you want 23:00 Paris during winter instead.
#
# Pipeline shape:
#   pre-check  → decide whether to release at all and produce the build
#                number / tag / release notes used by every later job.
#   build-android  → ubuntu-latest, AAB + 3 split APKs (parallel with iOS).
#   build-ios      → macos-latest, signed IPA + dSYMs (parallel with Android).
#   release        → ubuntu-latest, downloads both build artifacts and
#                    creates the GitHub release with all attachments.
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

concurrency:
  group: daily-github-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pre-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      commit_count: ${{ steps.check.outputs.commit_count }}
      previous_tag: ${{ steps.prev.outputs.previous_tag }}
      base_sha: ${{ steps.prev.outputs.base_sha }}
      build_number: ${{ steps.bn.outputs.build_number }}
      tag: ${{ steps.bn.outputs.tag }}
      release_name: ${{ steps.bn.outputs.release_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master
          fetch-depth: 0

      - name: Find previous nightly tag
        id: prev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PREV=$(gh release list --limit 50 --json tagName \
            --jq '[.[] | select(.tagName | startswith("nightly-"))][0].tagName // ""')
          if [ -z "$PREV" ]; then
            echo "No prior nightly release; using master root commit as base."
            BASE=$(git rev-list --max-parents=0 HEAD | head -1)
          else
            echo "Previous nightly release: $PREV"
            BASE=$(git rev-parse "$PREV")
          fi
          {
            echo "previous_tag=$PREV"
            echo "base_sha=$BASE"
          } >> "$GITHUB_OUTPUT"

      - name: Check for new commits since last release
        id: check
        run: |
          set -euo pipefail
          BASE='${{ steps.prev.outputs.base_sha }}'
          COUNT=$(git rev-list "${BASE}..HEAD" --count)
          echo "commit_count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -eq 0 ]; then
            echo "::notice::No new commits since the last nightly release; will skip build + publish."
          else
            echo "Will release $COUNT new commit(s) since the previous nightly."
          fi

      - name: Compute date-based build number and tag
        if: steps.check.outputs.commit_count != '0'
        id: bn
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BN=$(TZ=Europe/Paris date +%Y%m%d)
          DATE=$(TZ=Europe/Paris date +%Y-%m-%d)
          # If there's already a nightly-YYYYMMDD release (e.g. a
          # workflow_dispatch re-run), suffix with -HHMM to keep tags
          # unique.
          TAG="nightly-$BN"
          if gh release view "$TAG" >/dev/null 2>&1; then
            SUFFIX=$(TZ=Europe/Paris date +%H%M)
            TAG="nightly-${BN}-${SUFFIX}"
          fi
          {
            echo "build_number=$BN"
            echo "tag=$TAG"
            echo "release_name=Nightly $DATE"
          } >> "$GITHUB_OUTPUT"

  build-android:
    needs: pre-check
    if: needs.pre-check.outputs.commit_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "::error::Missing keystore secrets. Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS." >&2
            exit 1
          fi
          KEYSTORE_PATH="$RUNNER_TEMP/upload-keystore.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          {
            echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH"
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
          } >> "$GITHUB_ENV"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build AAB (play flavor)
        # #1777 — `--obfuscate` strips Dart symbol names from the
        # release binary; `--split-debug-info` writes the symbol files
        # needed to de-obfuscate later crash reports (uploaded below).
        run: |
          flutter build appbundle --release --flavor play \
            --build-number=${{ needs.pre-check.outputs.build_number }} \
            --obfuscate --split-debug-info=build/symbols

      # Per-ABI APKs were dropped from the public nightly release on
      # purpose — Play App Signing re-signs every Play install with
      # Google's app-signing key (different from the upload key the
      # CI keystore uses), so sideloaded APKs from the GitHub release
      # ALWAYS clashed with Play installs (Android refuses to update
      # across signing certs). Single-channel distribution via Play
      # Store / TestFlight is now the canonical path for end-users.
      # Developers needing a personal APK can trigger `.github/
      # workflows/dev-apk.yml` from the Actions UI; the artifact lives
      # on the run, not on the public Releases page.

      - name: Clean up decoded keystore
        if: always() && env.ANDROID_KEYSTORE_PATH != ''
        run: rm -f "$ANDROID_KEYSTORE_PATH"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-release
          path: |
            build/app/outputs/bundle/playRelease/app-play-release.aab
          if-no-files-found: error
          retention-days: 7

      # #1777 — retain the obfuscation symbol files so an obfuscated
      # release crash can be de-obfuscated. Kept far longer than the
      # AAB itself (crash reports arrive over the release's lifetime).
      - name: Upload obfuscation symbols
        uses: actions/upload-artifact@v7
        with:
          name: android-debug-symbols
          path: build/symbols
          if-no-files-found: error
          retention-days: 90

  build-ios:
    needs: pre-check
    if: needs.pre-check.outputs.commit_count != '0'
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master

      - name: Select Xcode 26+
        # See ios-testflight.yml for the long-form rationale: Apple rejects
        # TestFlight uploads built with anything older than Xcode 26 (iOS
        # 26 SDK) post-iOS-26 release.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install CocoaPods under active Ruby
        # See ios-testflight.yml for the long-form rationale: the runner's
        # system pod is bound to a different Ruby than ruby/setup-ruby's, so
        # flutter's pod check fails. Reinstall pod under the active Ruby.
        run: gem install cocoapods --no-document

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        run: cd ios && pod install --repo-update

      - name: Decode App Store Connect API key
        env:
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          if [ -z "$ASC_KEY_BASE64" ]; then
            echo "::error::APP_STORE_CONNECT_API_KEY_BASE64 secret is not set." >&2
            exit 1
          fi
          KEY_PATH="$RUNNER_TEMP/asc-api-key.p8"
          echo "$ASC_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          echo "ASC_API_KEY_FILEPATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Set up SSH agent with match deploy key
        # Match repo is fetched via SSH using a deploy key stored as
        # MATCH_DEPLOY_KEY (read-only, scoped to the certs repo).
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}

      - name: Add github.com to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts

      - name: fastlane match_appstore + build_appstore
        working-directory: ios
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          IOS_BUILD_NUMBER: ${{ needs.pre-check.outputs.build_number }}
          FASTLANE_DISABLE_COLORS: '1'
          FASTLANE_HIDE_CHANGELOG: '1'
        run: |
          # match_appstore (readonly via Matchfile pinning) populates the
          # ephemeral keychain; build_appstore then runs `flutter build ios`
          # plus gym to produce a signed IPA + dSYMs at build/ios/ipa/.
          bundle exec fastlane match_appstore
          bundle exec fastlane build_appstore build_number:"${IOS_BUILD_NUMBER}"

      - name: Clean up decoded API key
        if: always()
        run: rm -f "$ASC_API_KEY_FILEPATH"

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ios-release
          path: |
            build/ios/ipa/Runner.ipa
            build/ios/ipa/*.app.dSYM.zip
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [pre-check, build-android, build-ios]
    if: needs.pre-check.outputs.commit_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master
          fetch-depth: 0

      - name: Download Android artifacts
        uses: actions/download-artifact@v8
        with:
          name: android-release
          path: artifacts/android

      - name: Download iOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: ios-release
          path: artifacts/ios

      - name: Compose release notes
        id: notes
        run: |
          set -euo pipefail
          BASE='${{ needs.pre-check.outputs.base_sha }}'
          PREV='${{ needs.pre-check.outputs.previous_tag }}'
          NOTES_FILE="$RUNNER_TEMP/release_notes.md"

          {
            if [ -z "$PREV" ]; then
              echo "## First nightly release"
              echo
              echo "All commits in master are included."
            else
              echo "## What's new since [$PREV](https://github.com/${{ github.repository }}/releases/tag/$PREV)"
            fi
          } > "$NOTES_FILE"

          # Group conventional-commit prefixes into a Markdown changelog.
          # Each line we emit from `git log` is "subject|short-sha". The
          # while-read consumer parses subjects of the form
          # "<type>(<scope>): <subject>" and strips the prefix for a
          # clean bullet, then we group bullets by type below.
          tmp=$(mktemp)
          git log "${BASE}..HEAD" --no-merges --pretty=format:'%s|%h' > "$tmp"

          for type in feat fix perf refactor docs test chore; do
            case "$type" in
              feat)     header="### ✨ Added" ;;
              fix)      header="### 🐛 Fixed" ;;
              perf)     header="### ⚡ Performance" ;;
              refactor) header="### 🛠 Refactored" ;;
              docs)     header="### 📝 Docs" ;;
              test)     header="### ✅ Tests" ;;
              chore)    header="### 🧹 Chores" ;;
            esac

            matches=$(grep -E "^${type}(\(|:)" "$tmp" || true)
            if [ -n "$matches" ]; then
              {
                echo
                echo "$header"
                echo
              } >> "$NOTES_FILE"
              echo "$matches" | while IFS='|' read -r subject sha; do
                clean=$(echo "$subject" | sed -E "s/^${type}(\([^)]*\))?:[[:space:]]*//")
                echo "- $clean (\`$sha\`)" >> "$NOTES_FILE"
              done
            fi
          done

          # Anything that isn't conventional-style still appears, so a
          # one-off subject doesn't silently disappear from the changelog.
          other=$(grep -vE '^(feat|fix|perf|refactor|docs|test|chore)(\(|:)' "$tmp" || true)
          if [ -n "$other" ]; then
            {
              echo
              echo "### Other"
              echo
            } >> "$NOTES_FILE"
            echo "$other" | while IFS='|' read -r subject sha; do
              echo "- $subject (\`$sha\`)" >> "$NOTES_FILE"
            done
          fi

          {
            echo
            echo "---"
            echo "### 📦 Attached artifacts"
            echo
            echo "**Android (Play flavor, signed):**"
            echo "- \`app-play-release.aab\` — Play Store bundle"
            echo
            echo "**iOS (App Store distribution, signed):**"
            echo "- \`Runner.ipa\` — distribution build (TestFlight / App Store; not directly sideloadable on consumer devices)"
            echo "- \`*.app.dSYM.zip\` — debug symbols for crash symbolication"
            echo
            echo "### 📱 Install / update"
            echo
            echo "- **Android users:** install via the [Sparkilo Play Store listing](https://play.google.com/store/apps/details?id=de.tankstellen.fuelprices). Public APKs are intentionally not attached — Play App Signing re-signs every Play install with Google's key, so sideloaded APKs would conflict with Play updates on the same device."
            echo "- **iOS users:** install via TestFlight."
            echo "- **Developers needing a local APK:** trigger the [\`Dev APK (arm64)\`](../actions/workflows/dev-apk.yml) workflow from the Actions UI. The APK is signed with the upload key and downloads from the run's Artifacts pane — useful for inspecting a specific commit on your own device. NOT distributable, NOT cross-channel-updatable with Play."
            echo
            echo "_Build number: ${{ needs.pre-check.outputs.build_number }} · Built from \`${{ github.sha }}\`_"
          } >> "$NOTES_FILE"

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo "Generated release notes:"
          cat "$NOTES_FILE"

      - name: Create GitHub release
        env:
          # The default GITHUB_TOKEN started returning HTTP 403 ("Resource
          # not accessible by integration") on `POST /repos/.../releases`
          # in May 2026 even with workflow-level `permissions: contents:
          # write` (verified identical token grants `Contents: write,
          # Metadata: read` on a working May-7 run vs. a failing May-9
          # re-run, and the repo-level `default_workflow_permissions`
          # being read OR write made no difference). The error means
          # the GitHub App installation token (= GITHUB_TOKEN) is being
          # rejected at the resource level, not on token scope.
          #
          # Workaround: use a Personal Access Token saved as the
          # `RELEASE_TOKEN` repo secret. The token needs `contents:
          # read/write` on this repo and nothing else. Falling back to
          # `github.token` if RELEASE_TOKEN is absent so a fresh fork
          # without the secret still attempts the workflow (it'll fail
          # the same way the default token does today, but at least the
          # error message stays self-explanatory rather than the workflow
          # silently noop'ing).
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          set -euo pipefail
          # Collect every artifact that's actually present — `find`-based so
          # an extra dSYM zip from a workspace target (e.g. WidgetKit
          # extension once it's wired) gets included automatically.
          mapfile -t ASSETS < <(
            find artifacts/android artifacts/ios -type f \
              \( -name '*.aab' -o -name '*.apk' -o -name '*.ipa' -o -name '*.dSYM.zip' \) \
              | sort
          )
          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "::error::No release artifacts found under artifacts/." >&2
            exit 1
          fi
          echo "Attaching ${#ASSETS[@]} asset(s):"
          printf '  - %s\n' "${ASSETS[@]}"

          gh release create '${{ needs.pre-check.outputs.tag }}' \
            --title '${{ needs.pre-check.outputs.release_name }}' \
            --notes-file '${{ steps.notes.outputs.notes_file }}' \
            --prerelease \
            --target '${{ github.sha }}' \
            "${ASSETS[@]}"

      - name: Prune old nightly releases (keep latest only)
        env:
          # Same RELEASE_TOKEN used by `gh release create` above — needs
          # `contents: write` to delete releases AND tags.
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          NEW_TAG: ${{ needs.pre-check.outputs.tag }}
        run: |
          set -euo pipefail
          # Storage hygiene: each nightly bundles ~300 MB of artifacts
          # (AAB + 3 APK splits + IPA + dSYMs). Keeping every nightly
          # forever balloons the GitHub release storage quota and the
          # Releases page becomes noisy. Keep ONLY the just-published
          # release; delete every other `nightly-*` tag along with its
          # assets and git tag.
          #
          # We filter strictly on the `nightly-` tag prefix so:
          #   - `permissions-evidence-2026-05-08` and other ad-hoc tags
          #     are preserved (they document point-in-time evidence).
          #   - Any future `v5.0.0` / real-release tags are preserved
          #     (semver releases are not garbage).
          #
          # `--cleanup-tag` removes the underlying git tag too — without
          # it the release would disappear but the tag would linger
          # forever in `git tag -l`.
          gh release list --limit 200 --json tagName \
            --jq ".[] | select(.tagName | startswith(\"nightly-\")) | select(.tagName != \"$NEW_TAG\") | .tagName" \
          | while read -r tag; do
              [ -z "$tag" ] && continue
              echo "Pruning old nightly release: $tag"
              if ! gh release delete "$tag" --cleanup-tag --yes; then
                echo "::warning::failed to delete release $tag — continuing"
              fi
            done

      - name: Summary
        if: always()
        run: |
          {
            echo "## Daily GitHub Release"
            echo
            echo "- **Tag:** [\`${{ needs.pre-check.outputs.tag }}\`](https://github.com/${{ github.repository }}/releases/tag/${{ needs.pre-check.outputs.tag }})"
            echo "- **Build number:** ${{ needs.pre-check.outputs.build_number }}"
            echo "- **Commits since last release:** ${{ needs.pre-check.outputs.commit_count }}"
            echo "- **Artifacts:** Android AAB + 3× APK splits, iOS IPA + dSYMs"
          } >> "$GITHUB_STEP_SUMMARY"

  skipped-summary:
    needs: pre-check
    if: needs.pre-check.outputs.commit_count == '0'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Summary
        run: |
          {
            echo "## Daily GitHub Release"
            echo
            if [ -n "${{ needs.pre-check.outputs.previous_tag }}" ]; then
              echo "**Skipped:** no new commits since [\`${{ needs.pre-check.outputs.previous_tag }}\`](https://github.com/${{ github.repository }}/releases/tag/${{ needs.pre-check.outputs.previous_tag }})."
            else
              echo "**Skipped:** no commits in master."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
