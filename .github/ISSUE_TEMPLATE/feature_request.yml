name: Feature Request
description: Suggest a new feature or improvement
labels: ["type/feature", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How you'd like it to work.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Search
        - Map
        - Favorites
        - Settings
        - Route search
        - Price alerts
        - TankSync (cloud sync)
        - Localization / languages
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, or examples from other apps.
