name: Bug Report
description: Report something that isn't working correctly
labels: ["type/bug", "needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      value: |
        1. Go to '...'
        2. Tap on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Crash / data loss
        - Incorrect behavior
        - Cosmetic / visual
        - Performance
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: e.g. 4.1.0
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device & OS
      placeholder: e.g. Samsung Galaxy S23, Android 14

  - type: dropdown
    id: country
    attributes:
      label: Country / API affected
      options:
        - Germany (Tankerkoenig)
        - France (data.gouv.fr)
        - Italy (MASE)
        - Spain (Geoportal)
        - Austria (E-Control)
        - Belgium (FOD Economie)
        - Luxembourg (ILR)
        - Not country-specific

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots or screen recordings.
