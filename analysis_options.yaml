# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

# riverpod_lint 3.x ships as a NATIVE analyzer plugin (#3159) — its
# diagnostics surface directly in `flutter analyze` (and therefore in CI's
# analyze gate) and in IDEs. Note: custom_lint is NOT used — every
# custom_lint release requires analyzer <9 while riverpod_generator 4.x
# requires analyzer ^9, so the custom_lint route is unresolvable here.
plugins:
  riverpod_lint:
    version: 3.1.3
    # #3272 — the four warning-level rules disabled at adoption (#3159)
    # are re-enabled; the burn-down landed: the `ref.keepAlive()`
    # rebuild-throttle pattern is gone from the codebase, the pre-init
    # runApp hosts (SplashHost / StorageRecoveryHost) now mount a bare
    # ProviderScope, family call sites all pass stable (identifier /
    # field) arguments, and lib/ has no nested ProviderScope. The two
    # deliberate exceptions (the bootstrap-owned UncontrolledProviderScope
    # root; the keepAlive LiveActivitySync watching the autoDispose radar
    # fallback) carry a site `// ignore: <rule>` with rationale — if one
    # of those still fires (see the ignore-comment caveat below), the fix
    # is a riverpod_lint bump, not re-disabling the rule globally.
    diagnostics:
      # #3161 — CI analyze is now fatal on infos, which would make this
      # info-level rule a build breaker. All 38 findings were audited:
      # the 7 lib sites are deliberate, documented seams (test-override
      # function fields in InAppReviewService, the cross-provider read
      # getters on TripRecording (#888), the broadcast event/bus stream
      # getters in HapticEcoCoachLifecycle (#1273) and LiveHarshEventBus)
      # and the 31 test sites are fake-notifier probe fields. riverpod_lint
      # 3.1.3's native plugin does NOT honor `// ignore:` /
      # `// ignore_for_file:` comments (verified empirically), so per-site
      # opt-outs are impossible — disabling the rule is the only lever.
      # Re-enable once the plugin honors ignore comments (#3272 reviewed:
      # blocker unchanged at 3.1.3; the 38 sites are deliberate seams /
      # test-fake probe fields, not restructurable as lint hygiene).
      avoid_public_notifier_properties: false
      # #3272 review outcome for the two remaining warning rules: their
      # per-site `// ignore:` comments are ALSO inert at 3.1.3 (verified —
      # an ignored only_use_keep_alive site still reported), so zero-finding
      # enablement is impossible where findings are deliberate:
      #  * only_use_keep_alive_inside_keep_alive — 7 audited lib edges where
      #    a keepAlive notifier deliberately reads/watches an autoDispose
      #    provider (user_position_provider:63, country_detection_provider:31,
      #    nearest_widget_refresh_provider:101/111/145,
      #    trip_recording_provider:1046, live_activity_provider:90 (#3170)).
      #  * scoped_providers_should_specify_dependencies — 12 findings, all
      #    test-harness ProviderScope(overrides:) sites; harmless there.
      # Unblock lever for both: a riverpod_lint bump whose plugin honors
      # ignore comments (pins riverpod — see pubspec), then re-enable and
      # convert this inventory into per-site opt-outs.
      only_use_keep_alive_inside_keep_alive: false
      scoped_providers_should_specify_dependencies: false

analyzer:
  # Vendored upstream plugins (patched for the GMS-free F-Droid build, #3473 —
  # e.g. third_party/geolocator_android) keep their own upstream conventions;
  # don't hold third-party code to the app's strict lints. They compile as
  # normal packages; only the app's own sources are linted.
  exclude:
    - third_party/**
  # Strict language modes (#3160) — the project paid for implicit-dynamic
  # casts twice (#2296, #2311 in the Hive/JSON codec layer); these make
  # implicit downcasts, raw generic types and uninferable invocations
  # compile-time diagnostics instead of runtime surprises.
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # freezed uses @JsonKey on constructor parameters, which the analyzer
    # flags as invalid. This is a known false positive with freezed.
    invalid_annotation_target: ignore
    # Enforce const constructors — all violations must be fixed
    prefer_const_constructors: error
    prefer_const_declarations: info
    prefer_const_literals_to_create_immutables: info
    # Safety lints elevated to error (issue #422). Each catches a real
    # class of bug:
    #   - use_build_context_synchronously → StateError on widget unmount
    #   - unawaited_futures → fire-and-forget data persistence races
    #   - cancel_subscriptions → leaked StreamSubscription on dispose
    #   - close_sinks → leaked StreamController/IOSink on dispose
    use_build_context_synchronously: error
    unawaited_futures: error
    cancel_subscriptions: error
    close_sinks: error
    # #3161 — the "phase in at info" era is over: the codebase is clean,
    # CI runs `flutter analyze` with fatal infos, and the correctness
    # subset is promoted to error so a violation is unmistakably a build
    # failure (not a fatal-info side effect that a future flag tweak
    # could silently un-fatal).
    avoid_slow_async_io: error
    avoid_type_to_string: error
    no_logic_in_create_state: error
    prefer_void_to_null: error
    test_types_in_equals: error
    throw_in_finally: error
    unnecessary_statements: error
    unrelated_type_equality_checks: error
    valid_regexps: error
    # Style-leaning; stays info (still fatal in CI since #3161, but an
    # IDE shows it in proportion to its weight).
    avoid_print: info
    # #3161 — sync-context fire-and-forget (dispose, constructors,
    # non-async callbacks) was previously unchecked; `unawaited_futures`
    # only covers async bodies. Deliberate fire-and-forget wraps in
    # `unawaited(...)`.
    discarded_futures: error

linter:
  rules:
    # Originals — kept promoted so new code stays clean.
    - avoid_catching_errors
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables

    # Correctness — strongly recommended by dart.dev / lint.pub.
    - avoid_slow_async_io
    - avoid_type_to_string
    - cancel_subscriptions
    - close_sinks
    - discarded_futures
    - no_adjacent_strings_in_list
    - no_logic_in_create_state
    - prefer_void_to_null
    - test_types_in_equals
    - throw_in_finally
    - unnecessary_statements
    - unrelated_type_equality_checks
    - use_build_context_synchronously
    - valid_regexps

    # Style / maintainability.
    - avoid_print
    - avoid_unnecessary_containers
    - prefer_final_locals
    - prefer_single_quotes
    - sized_box_for_whitespace
    - sort_child_properties_last
    - unawaited_futures
    - use_key_in_widget_constructors
