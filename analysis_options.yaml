# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

# riverpod_lint 3.x ships as a NATIVE analyzer plugin (#3159) — its
# diagnostics surface directly in `flutter analyze` (and therefore in CI's
# analyze gate) and in IDEs. Note: custom_lint is NOT used — every
# custom_lint release requires analyzer <9 while riverpod_generator 4.x
# requires analyzer ^9, so the custom_lint route is unresolvable here.
plugins:
  riverpod_lint:
    version: 3.1.3
    # Warning-level rules disabled for now (#3159): `flutter analyze` is
    # warning-fatal in CI and the initial run surfaced ~20 findings across
    # these four rules (several in files owned by in-flight branches, the
    # rest pre-existing patterns like `ref.keepAlive()` inside autoDispose
    # rebuild-throttles and the bootstrap-owned ProviderScope). Re-enable
    # rule by rule as the burn-down lands. Info-level rules (e.g.
    # avoid_public_notifier_properties) stay on — they don't fail CI.
    diagnostics:
      missing_provider_scope: false
      only_use_keep_alive_inside_keep_alive: false
      scoped_providers_should_specify_dependencies: false
      provider_parameters: false

analyzer:
  # Strict language modes (#3160) — the project paid for implicit-dynamic
  # casts twice (#2296, #2311 in the Hive/JSON codec layer); these make
  # implicit downcasts, raw generic types and uninferable invocations
  # compile-time diagnostics instead of runtime surprises.
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # freezed uses @JsonKey on constructor parameters, which the analyzer
    # flags as invalid. This is a known false positive with freezed.
    invalid_annotation_target: ignore
    # Enforce const constructors — all violations must be fixed
    prefer_const_constructors: error
    prefer_const_declarations: info
    prefer_const_literals_to_create_immutables: info
    # Safety lints elevated to error (issue #422). Each catches a real
    # class of bug:
    #   - use_build_context_synchronously → StateError on widget unmount
    #   - unawaited_futures → fire-and-forget data persistence races
    #   - cancel_subscriptions → leaked StreamSubscription on dispose
    #   - close_sinks → leaked StreamController/IOSink on dispose
    use_build_context_synchronously: error
    unawaited_futures: error
    cancel_subscriptions: error
    close_sinks: error
    # Phase in at info so existing code isn't a wall of red; tighten once clean.
    avoid_print: info
    avoid_slow_async_io: info
    avoid_type_to_string: info
    no_logic_in_create_state: info
    prefer_void_to_null: info
    test_types_in_equals: info
    throw_in_finally: info
    unnecessary_statements: info
    unrelated_type_equality_checks: info
    valid_regexps: info

linter:
  rules:
    # Originals — kept promoted so new code stays clean.
    - avoid_catching_errors
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables

    # Correctness — strongly recommended by dart.dev / lint.pub.
    - avoid_slow_async_io
    - avoid_type_to_string
    - cancel_subscriptions
    - close_sinks
    - no_adjacent_strings_in_list
    - no_logic_in_create_state
    - prefer_void_to_null
    - test_types_in_equals
    - throw_in_finally
    - unnecessary_statements
    - unrelated_type_equality_checks
    - use_build_context_synchronously
    - valid_regexps

    # Style / maintainability.
    - avoid_print
    - avoid_unnecessary_containers
    - prefer_final_locals
    - prefer_single_quotes
    - sized_box_for_whitespace
    - sort_child_properties_last
    - unawaited_futures
    - use_key_in_widget_constructors
