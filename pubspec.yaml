name: tankstellen
description: "Free fuel price comparison app — 11 countries, 23 languages, privacy-first"
publish_to: 'none'
version: 5.0.0+5122

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^4.0.2

  # Networking
  dio: ^5.7.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Maps & Location
  flutter_map: ^8.3.0
  flutter_map_marker_cluster: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Routing
  go_router: ^17.2.2

  # UI
  flex_color_scheme: ^8.1.0
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.1
  image: ^4.5.0

  # Data Classes
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0

  # Utilities
  collection: ^1.19.0
  meta: ^1.17.0
  xml: ^6.6.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  connectivity_plus: ^7.1.1
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.1
  http: ^1.3.0
  share_plus: ^12.0.2
  flutter_blue_plus: ^1.35.5
  async: ^2.11.0
  permission_handler: ^12.0.0+1
  flutter_secure_storage: ^10.0.0
  package_info_plus: ^8.3.1
  sentry_flutter: ^9.19.0
  home_widget: ^0.9.1
  workmanager: ^0.9.0
  shimmer: ^3.0.0
  flutter_tts: ^4.2.0
  flutter_local_notifications: ^21.0.0
  supabase_flutter: ^2.12.4
  wakelock_plus: ^1.2.8
  app_badge_plus: ^1.2.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.14.1
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3

  # Testing
  mocktail: ^1.0.5
  yaml: ^3.1.3
  flutter_launcher_icons: ^0.14.4
  # Required only by the FeedbackTokenSection widget test, which uses
  # `FlutterSecureStoragePlatform.instance` to inject a fake store
  # without going through the platform method channel (#952 phase 3).
  flutter_secure_storage_platform_interface: ^2.0.1
  # Required only by the DrivingStationSheet widget test, which swaps
  # `UrlLauncherPlatform.instance` with a fake to assert the geo: URI
  # the Navigate button emits without going through a real intent.
  # Mixing in MockPlatformInterfaceMixin (from plugin_platform_interface)
  # bypasses the verify-token guard for tests only.
  url_launcher_platform_interface: ^2.3.2
  plugin_platform_interface: ^2.1.8

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/receipt_overrides/index.json
    - assets/reference_vehicles/vehicles.json

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  adaptive_icon_background: "#2E7D32"
  min_sdk_android: 21
  web:
    generate: false

